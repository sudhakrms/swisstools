<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Parikaraalu — Tiny utilities, beautifully done." />
  <title>Parikaraalu</title>

  <!-- Design tokens & styles -->
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/app.css" />
  <link rel="stylesheet" href="styles/components.css" />

  <!-- Preact via CDN (no build step) -->
  <script src="https://cdn.jsdelivr.net/npm/preact@10.19.3/dist/preact.umd.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/preact@10.19.3/hooks/dist/hooks.umd.js"></script>

  <script>
    // Expose Preact globals so ES modules can use them via window.preact / window.preactHooks
    window.preact = preact;
    window.preactHooks = preactHooks;
  </script>

  <!-- Prevent flash of wrong theme -->
  <script>
    (function() {
      const saved = localStorage.getItem('parikaraalu_theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
